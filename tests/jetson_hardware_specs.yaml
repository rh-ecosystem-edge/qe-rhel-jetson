# Jetson hardware expected values per test category.
#
# Keys are match strings: substrings to look for in HARDWARE_MODEL_NAME (from dmidecode
# Product Name or devicetree model).
#
# Reference: https://www.nvidia.com/en-us/autonomous-machines/embedded-systems/jetson-orin/#:~:text=View%20Jetson%20Orin%20Technical%20Specifications

# -----------------------------------------------------------------------------
# Shared templates (anchors for merge; not used as match keys)
# -----------------------------------------------------------------------------
_templates:
  nano: &nano_common
    dla: { supported: false }
    pva: { supported: false }
    video_enc: { supported: false }
    video_dec: { supported: true }
  agx: &agx_common
    dla: { supported: true }
    pva: { supported: true }
    video_enc: { supported: true }
    video_dec: { supported: true }
  orin_nx: &orin_nx_common
    dla: { supported: true }
    pva: { supported: true }
    tools: { power_modes: ["10W", "15W", "25W", "40W"] }
    video_enc: { supported: true }
    video_dec: { supported: true }
    pcis: {
      "PCIe Gen4 x4": {capable_speed: 16, lanes: 4, logical_slots: 1 }, # 16GT/s = Gen 4.
      "PCIe Gen4 x1": {capable_speed: 16, lanes: 1, logical_slots: 3 }, # 16GT/s = Gen 4.
    }

# -----------------------------------------------------------------------------
# Hardware entries. Key = match string (substring of device Product Name).
# -----------------------------------------------------------------------------
"AGX Orin Developer Kit":
  <<: *agx_common
  # Power modes can be any value in range (min/max Watts), not only discrete 15W/60W.
  tools: { power_modes: { min: 15, max: 60 } }
  pcis: {
    "PCIe slot x16": {capable_speed: 16, lanes: 8, logical_slots: 1 }, # 16GT/s = Gen 4.
    "M.2 Key M slot x4": {capable_speed: 16, lanes: 4, logical_slots: 1 }, # 16GT/s = Gen 4.
    "M.2 Key E slot x1": {capable_speed: 16, lanes: 1, logical_slots: 1 }  # 16GT/s = Gen 4.
  }

"AGX Orin 64GB":
  <<: *agx_common
  tools: { power_modes: { min: 15, max: 60 } }
  pcis: {
    "PCIe Gen4 x8": {capable_speed: 16, lanes: 8, logical_slots: 1 }, # 16GT/s = Gen 4. # In spec sheet says "Up to 2 x8"
    "PCIe Gen4 x4": {capable_speed: 16, lanes: 4, logical_slots: 1 }, # 16GT/s = Gen 4.
    "PCIe Gen4 x1": {capable_speed: 16, lanes: 1, logical_slots: 2 }  # 16GT/s = Gen 4.
  }

"AGX Orin 32GB":
  <<: *agx_common
  tools: { power_modes: { min: 15, max: 40 } }
  pcis: {
    "PCIe Gen4 x8": {capable_speed: 16, lanes: 8, logical_slots: 1 }, # 16GT/s = Gen 4. # In spec sheet says "Up to 2 x8"
    "PCIe Gen4 x4": {capable_speed: 16, lanes: 4, logical_slots: 1 }, # 16GT/s = Gen 4.
    "PCIe Gen4 x1": {capable_speed: 16, lanes: 1, logical_slots: 2 }  # 16GT/s = Gen 4.
  }

"AGX Orin Industrial":
  <<: *agx_common
  tools: { power_modes: { min: 15, max: 75 } }
  pcis: {
    "PCIe Gen4 x8": {capable_speed: 16, lanes: 8, logical_slots: 1 }, # 16GT/s = Gen 4. # In spec sheet says "Up to 2 x8"
    "PCIe Gen4 x4": {capable_speed: 16, lanes: 4, logical_slots: 1 }, # 16GT/s = Gen 4.
    "PCIe Gen4 x1": {capable_speed: 16, lanes: 1, logical_slots: 2 }  # 16GT/s = Gen 4.
  }

"Orin NX 16GB":
  <<: *orin_nx_common

"Orin NX 8GB":
  <<: *orin_nx_common

"Orin Nano Developer Kit":
  <<: *nano_common
  tools: { power_modes: ["7W", "15W"] }
  pcis: {
    "M.2 Key M slot x4": {capable_speed: 8, lanes: 4, logical_slots: 1 }, # 8GT/s = Gen 3.
    "M.2 Key M slot x2": {capable_speed: 8, lanes: 2, logical_slots: 1 }, # 8GT/s = Gen 3.
    "M.2 Key E slot x1": {capable_speed: 8, lanes: 1, logical_slots: 1 }  # 8GT/s = Gen 3.
  }

"Orin Nano 8GB":
  <<: *nano_common
  tools: { power_modes: ["7W", "15W", "25W"] }
  pcis: {
    "PCIe Gen3 x4": {capable_speed: 8, lanes: 4, logical_slots: 1 }, # 8GT/s = Gen 3.
    "PCIe Gen3 x1": {capable_speed: 8, lanes: 1, logical_slots: 3 }, # 8GT/s = Gen 3.
  }

"Orin Nano 4GB":
  <<: *nano_common
  tools: { power_modes: ["7W", "10W", "25W"] }
  pcis: {
    "PCIe Gen3 x4": {capable_speed: 8, lanes: 4, logical_slots: 1 }, # 8GT/s = Gen 3.
    "PCIe Gen3 x1": {capable_speed: 8, lanes: 1, logical_slots: 3 }, # 8GT/s = Gen 3.
  }




