# Ansible inventory for Jetson systems
#
# Usage:
#   # Use default target
#   ansible-playbook -i inventory.yml install_bootc.yml --ask-vault-pass
#
#   # Override target via command line
#   ansible-playbook -i inventory.yml install_bootc.yml --ask-vault-pass \
#     -e "target_host=nvidia-jetson-agx-orin-03.khw.eng.bos2.dc.redhat.com"
#
all:
  hosts:
    jetson:
      # Default target - override with -e "target_host=..."
      ansible_host: "{{ target_host | default('nvidia-jetson-agx-orin-05.khw.eng.bos2.dc.redhat.com') }}"
      ansible_user: root
      ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

  vars:
    # Bootc image to install
    bootc_image: "registry.gitlab.com/redhat/rhel/sst/orin-sidecar/nvidia-jetson-sidecar/rhel-9.7:523ef1e4"
    
    # Registry
    registry_url: "registry.gitlab.com"
   
    # Boot restoration settings
    boot_restore_hours: 22
    boot_label: "Red Hat Enterprise Linux bootc"

