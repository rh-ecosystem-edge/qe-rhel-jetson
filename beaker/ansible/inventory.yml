# Ansible inventory for Jetson systems
#
# Usage:
#   # Use default target
#   ansible-playbook -i inventory.yml install_bootc.yml --ask-vault-pass
#
#   # Override target via command line
#   ansible-playbook -i inventory.yml install_bootc.yml --ask-vault-pass \
#     -e "target_host=nvidia-jetson-agx-orin-03.khw.eng.bos2.dc.redhat.com"
#
#   # Override only the image tag/hash (base URL unchanged, from the gitlab nvidia-jetson-sidecar repo):
#   ansible-playbook -i inventory.yml install_bootc.yml --ask-vault-pass \
#     -e "bootc_image_tag=523ef1e4"
#
#   # Override reservation length; boot order restores 2h before reservation ends:
#   ansible-playbook -i inventory.yml install_bootc.yml --ask-vault-pass \
#     -e "reservation_hours=24"
#
all:
  hosts:
    jetson:
      # Default target - override with -e "target_host=..."
      ansible_host: "{{ target_host | default('nvidia-jetson-agx-orin-05.khw.eng.bos2.dc.redhat.com') }}"
      ansible_user: root
      ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

  vars:
    # Bootc image: base (repo path without tag) + tag (override with -e "bootc_image_tag=...")
    bootc_image_base: "registry.gitlab.com/redhat/rhel/sst/orin-sidecar/nvidia-jetson-sidecar/rhel-9.7"
    bootc_image_tag: "411ed591"
    bootc_image: "{{ bootc_image_base }}:{{ bootc_image_tag }}"
    
    # Registry
    registry_url: "registry.gitlab.com"
   
    # Boot restoration: pass -e "reservation_hours=..." (e.g. ${RESERVATION_HOURS}); | int so string "99" works.
    # boot_restore_hours is set to reservation_hours - 2 (restore 2h before reservation ends).
    reservation_hours: 24
    boot_restore_hours: "{{ (reservation_hours | default(24) | int) - 2 }}"
    boot_label: "Red Hat Enterprise Linux bootc"

