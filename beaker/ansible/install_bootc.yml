---
# Ansible Playbook: Install bootc on Jetson Beaker Machines
#
# Usage:
#   ansible-playbook -i inventory.yml install_bootc.yml \
#     -e "registry_user='Guy Gordani'" \
#     -e "registry_pass='YOUR_TOKEN'" \
#     --limit jetson-orin-05
#
# With vault for credentials:
#   ansible-playbook -i inventory.yml install_bootc.yml --ask-vault-pass
#
# Dry run:
#   ansible-playbook -i inventory.yml install_bootc.yml --check
#
# Based on: Installing bootc image on Jetson Beaker Machines - V2 (Google Doc).
# https://docs.google.com/document/d/1dyfA2f4EQjRhe3CP-JKi8S3K54ILlBg0hXQFFEnlpao

- name: Install bootc on Jetson systems
  hosts: all
  gather_facts: true
  become: true
  
  vars:
    # Defaults for bootc_image, registry_url, boot_restore_hours come from inventory.yml
    # (override with -e e.g. -e "bootc_image_tag=...")
    auto_reboot: true
    setup_boot_restore: true
  
  vars_files:
    - vars/secrets.yml  # Contains registry_user and registry_pass (encrypted with ansible-vault)
  
  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - registry_user is defined
          - registry_pass is defined
        fail_msg: "registry_user and registry_pass are required. Use -e 'registry_user=xxx registry_pass=xxx'"
    
    - name: Display target information
      ansible.builtin.debug:
        msg: |
          Target: {{ inventory_hostname }} ({{ ansible_host }})
          Image:  {{ bootc_image }}
          OS:     {{ ansible_distribution | default('unknown') }} {{ ansible_distribution_version | default('') }}
          Arch:   {{ ansible_architecture | default('unknown') }}
  
  tasks:
    #=========================================================================
    # Step 1: Install podman
    #=========================================================================
    - name: Install podman
      ansible.builtin.dnf:
        name: podman
        state: present
      tags: [podman]
    
    #=========================================================================
    # Step 2: Save original boot order
    #=========================================================================
    - name: Get current EFI boot configuration
      ansible.builtin.command: efibootmgr
      register: efi_boot_info
      changed_when: false
      tags: [boot]
    
    - name: Parse boot order
      ansible.builtin.set_fact:
        original_boot_order: "{{ efi_boot_info.stdout | regex_search('BootOrder: (.+)', '\\1') | first }}"
      tags: [boot]
    
    - name: Find PXE boot entry
      ansible.builtin.set_fact:
        pxe_entry: "{{ efi_boot_info.stdout | regex_search('Boot([0-9A-Fa-f]{4})\\* .*PXEv4', '\\1') | first }}"
      tags: [boot]
    
    - name: Display boot information
      ansible.builtin.debug:
        msg: |
          Original boot order: {{ original_boot_order }}
          PXE entry: Boot{{ pxe_entry }}
      tags: [boot]
    
    - name: Save boot order to local file
      ansible.builtin.copy:
        content: |
          # Boot order saved at {{ (ansible_date_time | default({'iso8601': 'unknown'})).iso8601 }}
          # Host: {{ inventory_hostname }}
          {{ efi_boot_info.stdout }}
        dest: "/root/original_boot_order.txt"
        mode: '0644'
      tags: [boot]
    
    #=========================================================================
    # Step 3: Login to container registry
    #=========================================================================
    - name: Login to container registry
      ansible.builtin.command:
        cmd: podman login {{ registry_url }} -u "{{ registry_user }}" -p "{{ registry_pass }}"
      no_log: true  # Don't log credentials
      changed_when: true
      tags: [registry]
    
    #=========================================================================
    # Step 4: Pre-flight checks & Pull bootc image
    #=========================================================================
    - name: Check available disk space for container image
      ansible.builtin.shell: (df -BG --output=avail /var/lib/containers || df -BG --output=avail / | awk 'NR==2 {print $4}') | tail -n1 | sed 's/G//'
      register: disk_space
      changed_when: false
      tags: [image]

    - name: Ensure sufficient disk space for container image
      ansible.builtin.assert:
        that:
          - disk_space.stdout | trim | int > 10
        fail_msg: "Insufficient disk space. Need at least 10GB free, have {{ disk_space.stdout | trim }}GB"
      tags: [image]

    - name: Pull bootc image
      ansible.builtin.command:
        cmd: podman pull {{ bootc_image }}
      register: pull_result
      changed_when: "'Copying' in pull_result.stdout or 'Writing' in pull_result.stderr"
      async: 1800
      poll: 15
      tags: [image]

    #=========================================================================
    # Step 5: Run bootc install to-existing-root
    #=========================================================================
    - name: Run bootc install to-existing-root
      ansible.builtin.command:
        cmd: >
          podman run --rm --privileged
          -v /dev:/dev
          -v /var/lib/containers:/var/lib/containers
          -v /:/target
          --pid=host --security-opt label=type:unconfined_t
          {{ bootc_image }}
          bootc install to-existing-root
          --root-ssh-authorized-keys=/target/root/.ssh/authorized_keys
          --skip-fetch-check
      register: bootc_install
      async: 2400
      poll: 15
      tags: [install]
    
    - name: Display bootc install output
      ansible.builtin.debug:
        var: bootc_install.stdout_lines
      tags: [install]
    
    #=========================================================================
    # Step 6: Find EFI device
    #=========================================================================
    - name: Get EFI mount device
      ansible.builtin.command: findmnt -n -o SOURCE /boot/efi
      register: efi_mount
      changed_when: false
      tags: [efi]
    
    - name: Set EFI partition device
      ansible.builtin.set_fact:
        efi_partition: "{{ efi_mount.stdout | trim | basename }}"
      tags: [efi]
    
    - name: Determine EFI disk from partition
      ansible.builtin.set_fact:
        efi_disk: "{{ efi_partition | regex_replace('p?\\d+$', '') }}"
      tags: [efi]
    
    - name: Display EFI device info
      ansible.builtin.debug:
        msg: "EFI partition: {{ efi_partition }}, disk: /dev/{{ efi_disk }}"
      tags: [efi]
    
    #=========================================================================
    # Step 7: Create EFI boot entry on correct device (mmcblk0 for Jetson)
    # Note: bootc install may create entries on nvme, but /boot/efi is on mmcblk0
    #=========================================================================
    - name: Check current EFI entries after bootc install
      ansible.builtin.command: efibootmgr
      register: current_efi
      changed_when: false
      tags: [efi]
    
    - name: Find any bootc entries (may be on wrong device)
      ansible.builtin.set_fact:
        existing_bootc_entries: "{{ current_efi.stdout | regex_findall('Boot([0-9A-Fa-f]{4})\\*.*bootc', ignorecase=True) }}"
      tags: [efi]
    
    - name: Delete existing bootc entries (may point to wrong device)
      ansible.builtin.command: "efibootmgr -b {{ item }} -B"
      loop: "{{ existing_bootc_entries }}"
      when: existing_bootc_entries | length > 0
      failed_when: false
      tags: [efi]
    
    - name: Create EFI boot entry on correct device ({{ efi_disk }})
      ansible.builtin.command:
        cmd: >
          efibootmgr --create
          --disk /dev/{{ efi_disk }}
          --part 1
          --label "{{ boot_label }}"
          --loader "\EFI\redhat\shimaa64.efi"
      register: efi_create
      tags: [efi]
    
    - name: Get new EFI boot configuration
      ansible.builtin.command: efibootmgr
      register: new_efi_info
      changed_when: false
      tags: [efi]
    
    - name: Find the new bootc entry
      ansible.builtin.set_fact:
        bootc_entries: "{{ new_efi_info.stdout | regex_findall('Boot([0-9A-Fa-f]{4})\\*.*bootc', ignorecase=True) }}"
      tags: [efi]
    
    - name: Display boot configuration
      ansible.builtin.debug:
        msg: |
          EFI device: /dev/{{ efi_disk }} ({{ efi_partition }})
          Bootc entry: {{ bootc_entries | join(', ') }}
          Boot order will be set with PXE ({{ pxe_entry }}) first
      tags: [efi]
    
    #=========================================================================
    # Step 8: Set up boot restoration (PXE first)
    #=========================================================================
    - name: Calculate PXE-first boot order
      ansible.builtin.set_fact:
        pxe_first_order: "{{ ([pxe_entry] + (original_boot_order.split(',') | reject('in', bootc_entries) | reject('eq', pxe_entry) | list)) | join(',') }}"
      when: setup_boot_restore
      tags: [restore]
    
    - name: Create boot restoration script
      ansible.builtin.copy:
        dest: /etc/ostree/restore_boot.sh
        mode: '0755'
        content: |
          #!/bin/bash
          echo "Restoring original EFI boot order for Beaker..."
          
          # Delete bootc entries
          {% for entry in bootc_entries %}
          if efibootmgr | grep -q "Boot{{ entry }}"; then
              echo "Deleting Boot{{ entry }}..."
              efibootmgr -b {{ entry }} -B 2>/dev/null || true
          fi
          {% endfor %}
          
          # Set PXE first boot order
          echo "Setting PXE-first boot order: {{ pxe_first_order }}"
          efibootmgr -o {{ pxe_first_order }}
          
          echo "Boot order restored. Rebooting..."
          reboot
      when: setup_boot_restore
      tags: [restore]
    
    - name: Create boot restoration systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/restore-bootorder.service
        mode: '0644'
        content: |
          [Unit]
          Description=Restore EFI Boot Order for Beaker
          
          [Service]
          Type=oneshot
          ExecStart=/etc/ostree/restore_boot.sh
          
          [Install]
          WantedBy=multi-user.target
      when: setup_boot_restore
      tags: [restore]
    
    - name: Create boot restoration timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/restore-bootorder.timer
        mode: '0644'
        content: |
          [Unit]
          Description=Restore Boot Order Timer - Runs {{ boot_restore_hours }}h before reservation ends
          
          [Timer]
          OnActiveSec={{ boot_restore_hours }}h
          Persistent=true
          
          [Install]
          WantedBy=timers.target
      when: setup_boot_restore
      tags: [restore]
    
    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: true
      when: setup_boot_restore
      tags: [restore]
    
    - name: Enable and start boot restoration timer
      ansible.builtin.systemd:
        name: restore-bootorder.timer
        enabled: true
        state: started
      when: setup_boot_restore
      tags: [restore]
    
    - name: Display restoration info
      ansible.builtin.debug:
        msg: |
          Boot restoration timer set for {{ boot_restore_hours }} hours (reservation {{ reservation_hours }}h, restore 2h before end)
          PXE-first order: {{ pxe_first_order }}
          Bootc entries to delete: {{ bootc_entries | join(', ') }}
      when: setup_boot_restore
      tags: [restore]
    
    #=========================================================================
    # Step 9: Reboot to new image
    #=========================================================================
    - name: Reboot to bootc image
      ansible.builtin.reboot:
        reboot_timeout: 600
        msg: "Rebooting to bootc image"
      when: auto_reboot
      tags: [reboot]
    
    #=========================================================================
    # Step 10: Verify deployment
    #=========================================================================
    - name: Wait for system to be accessible
      ansible.builtin.wait_for_connection:
        timeout: 300
      when: auto_reboot
      tags: [verify]
    
    - name: Check bootc status
      ansible.builtin.command: bootc status
      register: bootc_status
      changed_when: false
      failed_when: false
      tags: [verify]

    - name: Check rpm-ostree status
      ansible.builtin.command: rpm-ostree status
      register: rpm_ostree_status
      changed_when: false
      failed_when: false
      tags: [verify]
    
    - name: Check running kernel
      ansible.builtin.command: uname -r
      register: kernel_version
      changed_when: false
      tags: [verify]
    
    - name: Display deployment summary
      ansible.builtin.debug:
        msg: |
          ========================================
          Bootc Installation Complete!
          ========================================
          Host:   {{ inventory_hostname }}
          Kernel: {{ kernel_version.stdout }}
          Image:  {{ bootc_image }}
          
          Boot restore: {{ boot_restore_hours }}h (reservation {{ reservation_hours }}h)
          PXE entry:    Boot{{ pxe_entry }}
          ========================================
      tags: [verify]

