# Jetson hardware expected values per test category.
#
# Keys are match strings: substrings to look for in HARDWARE_MODEL_NAME (from dmidecode
# Product Name or devicetree model).
#
# Reference: https://www.nvidia.com/en-us/autonomous-machines/embedded-systems/jetson-orin/#:~:text=View%20Jetson%20Orin%20Technical%20Specifications

# -----------------------------------------------------------------------------
# Shared templates (anchors for merge; not used as match keys)
# -----------------------------------------------------------------------------
_templates:
  igx: &igx_common
    dla: { supported: true }
    pva: { supported: true }
    video_enc: { supported: true }
    video_dec: { supported: true }
  nano: &nano_common
    dla: { supported: false }
    pva: { supported: false }
    video_enc: { supported: false }
    video_dec: { supported: true }
  agx: &agx_common
    dla: { supported: true }
    pva: { supported: true }
    video_enc: { supported: true }
    video_dec: { supported: true }
  orin_nx: &orin_nx_common
    dla: { supported: true }
    pva: { supported: true }
    tools: { power_modes: ["10W", "15W", "25W", "40W"] }
    video_enc: { supported: true }
    video_dec: { supported: true }
    pcis: {
      "PCIe Gen4 x4": {capable_speed: "16GT/s", lanes: 4, logical_slots: 1 }, # 16GT/s = Gen 4.
      "PCIe Gen4 x1": {capable_speed: "16GT/s", lanes: 1, logical_slots: 3 }, # 16GT/s = Gen 4.
    }
    usbs: {
      "USB 3.2 Gen2": {capable_speed: "10000M", ports: 3 }, # 10000M = USB3.2 Gen2
      "USB 2.0": {capable_speed: "480M", ports: 3 }, # 480M = USB2.0
    }

# -----------------------------------------------------------------------------
# Hardware entries. Key = match string (substring of device Product Name).
# -----------------------------------------------------------------------------
"IGX Orin Develop":
  <<: *igx_common
  # Power modes can be any value in range (min/max Watts), not only discrete 15W/60W.
  tools: { power_modes: ["80W", "350W", "850W"] }
  pcis: {
    "x8 lanes within x16 physical connector": {capable_speed: "32GT/s", lanes: 8, logical_slots: 1 }, # 32GT/s = Gen5
    "x16 lanes within x16 physical connector": {capable_speed: "32GT/s", lanes: 16, logical_slots: 8 }, # 32GT/s = Gen5
  }
  usbs: {
    "1x USB 3.2 Gen2 Type-C connector": {capable_speed: "10000M", ports: 5 }, # 10000M = USB3.2 Gen2, 5 ports for the controller hub (1 for Type-C and 4 for Type-A)
    "1x USB 3.2 Gen2 Type-A connector": {capable_speed: "10000M", ports: 5 }, # 5 ports for the controller hub (1 for Type-C and 4 for Type-A)
  }

"AGX Orin Developer Kit":
  <<: *agx_common
  # Power modes can be any value in range (min/max Watts), not only discrete 15W/60W.
  tools: { power_modes: { min: 15, max: 60 } }
  pcis: {
    "PCIe slot x16": {capable_speed: "16GT/s", lanes: 8, logical_slots: 1 }, # 16GT/s = Gen 4.
    "M.2 Key M slot x4": {capable_speed: "16GT/s", lanes: 4, logical_slots: 1 }, # 16GT/s = Gen 4.
    "M.2 Key E slot x1": {capable_speed: "16GT/s", lanes: 1, logical_slots: 1 }  # 16GT/s = Gen 4.
  }
  usbs: {
    "USB Type-C/A connector Gen2/Gen1": {capable_speed: "10000M", ports: 4 }, # 10000M = USB3.2 Gen2, 5000M = USB3.2 Gen1, The controller hub has 4 ports with dynamic speed negotiation.
    "USB Micro-B connector": {capable_speed: "480M", ports: 4 }, # 480M = USB2.0, The USB Micro-B is physically wired to one of these 4 ports
  }

"AGX Orin 64GB":
  <<: *agx_common
  tools: { power_modes: { min: 15, max: 60 } }
  pcis: {
    "PCIe Gen4 x8": {capable_speed: "16GT/s", lanes: 8, logical_slots: 1 }, # 16GT/s = Gen 4. # In spec sheet says "Up to 2 x8"
    "PCIe Gen4 x4": {capable_speed: "16GT/s", lanes: 4, logical_slots: 1 }, # 16GT/s = Gen 4.
    "PCIe Gen4 x1": {capable_speed: "16GT/s", lanes: 1, logical_slots: 2 }  # 16GT/s = Gen 4.
  }
  usbs: {
    "USB 3.2 Gen2": {capable_speed: "10000M", ports: 3 }, # 10000M = USB3.2 Gen2
    "USB 2.0": {capable_speed: "480M", ports: 4 }, # 480M = USB2.0
  }

"AGX Orin 32GB":
  <<: *agx_common
  tools: { power_modes: { min: 15, max: 40 } }
  pcis: {
    "PCIe Gen4 x8": {capable_speed: "16GT/s", lanes: 8, logical_slots: 1 }, # 16GT/s = Gen 4. # In spec sheet says "Up to 2 x8"
    "PCIe Gen4 x4": {capable_speed: "16GT/s", lanes: 4, logical_slots: 1 }, # 16GT/s = Gen 4.
    "PCIe Gen4 x1": {capable_speed: "16GT/s", lanes: 1, logical_slots: 2 }  # 16GT/s = Gen 4.
  }
  usbs: {
    "USB 3.2 Gen2": {capable_speed: "10000M", ports: 3 }, # 10000M = USB3.2 Gen2
    "USB 2.0": {capable_speed: "480M", ports: 4 }, # 480M = USB2.0
  }

"AGX Orin Industrial":
  <<: *agx_common
  tools: { power_modes: { min: 15, max: 75 } }
  pcis: {
    "PCIe Gen4 x8": {capable_speed: "16GT/s", lanes: 8, logical_slots: 1 }, # 16GT/s = Gen 4. # In spec sheet says "Up to 2 x8"
    "PCIe Gen4 x4": {capable_speed: "16GT/s", lanes: 4, logical_slots: 1 }, # 16GT/s = Gen 4.
    "PCIe Gen4 x1": {capable_speed: "16GT/s", lanes: 1, logical_slots: 2 }  # 16GT/s = Gen 4.
  }
  usbs: {
    "USB 3.2 Gen2": {capable_speed: "10000M", ports: 3 }, # 10000M = USB3.2 Gen2
    "USB 2.0": {capable_speed: "480M", ports: 4 }, # 480M = USB2.0
  }

"Orin NX 16GB":
  <<: *orin_nx_common

"Orin NX 8GB":
  <<: *orin_nx_common

"Orin NX Developer Kit":
  <<: *orin_nx_common

"Orin NX Engineering Reference Developer Kit":
  <<: *orin_nx_common

"Orin Nano Developer Kit":
  <<: *nano_common
  tools: { power_modes: ["7W", "15W"] }
  pcis: {
    "M.2 Key M slot x4": {capable_speed: "8GT/s", lanes: 4, logical_slots: 1 }, # 8GT/s = Gen 3.
    "M.2 Key M slot x2": {capable_speed: "8GT/s", lanes: 2, logical_slots: 1 }, # 8GT/s = Gen 3.
    "M.2 Key E slot x1": {capable_speed: "8GT/s", lanes: 1, logical_slots: 1 }  # 8GT/s = Gen 3.
  }
  usbs: {
