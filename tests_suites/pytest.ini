[pytest]
addopts = 
    -s
    --strict-markers
    -W always::UserWarning
    #--log-cli-level=INFO
markers =
    critical: Critical tests that must pass
    extra: Extra tests (skipped by default, run with --run-extra or -m extra)
    xfail: Tests that are expected to fail
filterwarnings =
    always::UserWarning
